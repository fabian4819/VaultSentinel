# vault-sentinel-workflow.yaml
# Chainlink CRE Workflow: Systemic DeFi Risk Monitor
#
# Trigger: every 60 seconds
# Steps:
#   1. Fetch ETH/USD price from Chainlink Data Feed (mainnet)
#   2. Fetch Lido TVL from DeFiLlama
#   3. Fetch Aave/Maker protocol stats from DeFiLlama
#   4. Compute SYSTEMIC RISK INDEX (weighted composite score) in JavaScript
#   5. Write risk score on-chain (setRiskScore)
#      → VaultSentinel auto-triggers emergency if score >= 70
#   6. Log result for debugging

name: systemic-risk-monitor
description: |
  Aggregates risk signals from Chainlink ETH/USD Data Feed + multiple DeFi protocol TVLs
  (Lido, Aave, MakerDAO via DeFiLlama) to produce a Systemic DeFi Risk Index.
  Writes the score on-chain to VaultSentinel every 60s.
  If score >= 70, the vault automatically returns ALL user assets (ETH + ERC20s).

trigger:
  type: cron
  schedule: "*/60 * * * * *"

steps:
  # ─── Step 1: ETH/USD from Chainlink Data Feed (mainnet address) ───────────
  - id: fetch_eth_price
    type: chainlink-data-feed
    params:
      feedAddress: "0x5f4eC3Df9cbd43714FE2740f5E3616155c5b8419"  # ETH/USD Mainnet
    output: eth_price
    # Returns: { answer: <price * 1e8>, decimals: 8, updatedAt: <timestamp> }

  # ─── Step 2: Lido TVL from DeFiLlama ─────────────────────────────────────
  - id: fetch_lido_tvl
    type: http
    params:
      method: GET
      url: "https://api.llama.fi/protocol/lido"
      headers:
        Accept: "application/json"
    output: lido_response

  # ─── Step 3: Aave TVL from DeFiLlama ─────────────────────────────────────
  - id: fetch_aave_tvl
    type: http
    params:
      method: GET
      url: "https://api.llama.fi/protocol/aave"
      headers:
        Accept: "application/json"
    output: aave_response

  # ─── Step 4: MakerDAO TVL from DeFiLlama ─────────────────────────────────
  - id: fetch_maker_tvl
    type: http
    params:
      method: GET
      url: "https://api.llama.fi/protocol/makerdao"
      headers:
        Accept: "application/json"
    output: maker_response

  # ─── Step 5: Compute SYSTEMIC RISK INDEX ──────────────────────────────────
  - id: compute_systemic_risk
    type: javascript
    inputs:
      ethPrice: "{{fetch_eth_price.answer}}"
      decimals: "{{fetch_eth_price.decimals}}"
      lidoTvl: "{{lido_response.currentChainTvls.Ethereum}}"
      aaveTvl: "{{aave_response.currentChainTvls.Ethereum}}"
      makerTvl: "{{maker_response.currentChainTvls.Ethereum}}"
    code: |
      // Normalize ETH price from Chainlink 1e8 fixed-point
      const price = Number(ethPrice) / Math.pow(10, Number(decimals));

      // ── FACTOR 1: ETH Price Crash Score (30% weight) ─────────────────
      const PRICE_BASELINE = 3500;
      const priceDrop = Math.max(0, (PRICE_BASELINE - price) / PRICE_BASELINE * 100);
      const priceScore = Math.min(100, priceDrop * 2.5);

      // ── FACTOR 2: Lido TVL Drain Score (25% weight) ──────────────────
      const LIDO_BASELINE = 10_000_000_000; // $10B
      const lidoTvlNum = Number(lidoTvl || LIDO_BASELINE);
      const lidoDrop = Math.max(0, (LIDO_BASELINE - lidoTvlNum) / LIDO_BASELINE * 100);
      const lidoScore = Math.min(100, lidoDrop * 2);

      // ── FACTOR 3: Aave TVL Drain Score (25% weight) ──────────────────
      const AAVE_BASELINE = 8_000_000_000; // $8B
      const aaveTvlNum = Number(aaveTvl || AAVE_BASELINE);
      const aaveDrop = Math.max(0, (AAVE_BASELINE - aaveTvlNum) / AAVE_BASELINE * 100);
      const aaveScore = Math.min(100, aaveDrop * 2);

      // ── FACTOR 4: MakerDAO TVL Drain Score (20% weight) ──────────────
      const MAKER_BASELINE = 6_000_000_000; // $6B
      const makerTvlNum = Number(makerTvl || MAKER_BASELINE);
      const makerDrop = Math.max(0, (MAKER_BASELINE - makerTvlNum) / MAKER_BASELINE * 100);
      const makerScore = Math.min(100, makerDrop * 2);

      // ── Weighted Composite: Systemic Risk Index ───────────────────────
      const riskScore = Math.round(
        (priceScore * 0.30) +
        (lidoScore  * 0.25) +
        (aaveScore  * 0.25) +
        (makerScore * 0.20)
      );

      return {
        riskScore,
        breakdown: {
          ethPrice: price,
          priceScore: Math.round(priceScore),
          lidoTvlB: (lidoTvlNum / 1e9).toFixed(2),
          lidoScore: Math.round(lidoScore),
          aaveTvlB: (aaveTvlNum / 1e9).toFixed(2),
          aaveScore: Math.round(aaveScore),
          makerTvlB: (makerTvlNum / 1e9).toFixed(2),
          makerScore: Math.round(makerScore),
        }
      };
    output: risk_result

  # ─── Step 6: Write risk score on-chain (ALWAYS runs) ─────────────────────
  # VaultSentinel.setRiskScore() will internally call _executeEmergency()
  # if score >= riskThreshold (70), sweeping all ETH + ERC20s back to users.
  - id: write_risk_score
    type: eth-transaction
    params:
      rpcUrl: "{{env.TENDERLY_RPC_URL}}"
      contractAddress: "{{env.VAULT_SENTINEL_ADDRESS}}"
      abi:
        - "function setRiskScore(uint256 score) external"
      function: setRiskScore
      args:
        - "{{risk_result.riskScore}}"
      privateKey: "{{secrets.CRE_WALLET_PRIVATE_KEY}}"

  # ─── Step 7: Log full breakdown for debugging ─────────────────────────────
  - id: log_result
    type: javascript
    inputs:
      result: "{{risk_result}}"
    code: |
      const r = result;
      const b = r.breakdown;
      console.log(`[VaultSentinel] ═══ SYSTEMIC RISK INDEX ═══`);
      console.log(`  SCORE       : ${r.riskScore}/100 ${r.riskScore >= 70 ? "⚠️  EMERGENCY!" : "✅"}`);
      console.log(`  ETH Price   : $${b.ethPrice.toFixed(2)} → priceScore:  ${b.priceScore}`);
      console.log(`  Lido TVL    : $${b.lidoTvlB}B  → lidoScore:   ${b.lidoScore}`);
      console.log(`  Aave TVL    : $${b.aaveTvlB}B  → aaveScore:   ${b.aaveScore}`);
      console.log(`  MakerDAO    : $${b.makerTvlB}B  → makerScore:  ${b.makerScore}`);
      console.log(`  Weights     : ETH 30% | Lido 25% | Aave 25% | Maker 20%`);
      console.log(`════════════════════════════════════════`);
      if (r.riskScore >= 70) {
        console.log(`  🚨 THRESHOLD BREACHED — VaultSentinel emergency triggered!`);
        console.log(`  All user ETH + ERC20 assets returned automatically.`);
      }
      return result;
