<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Shield Shape -->
  <path d="M50 15L80 25V50C80 68.5 67.5 82.5 50 88C32.5 82.5 20 68.5 20 50V25L50 15Z" 
        stroke="url(#logo-grad)" stroke-width="4" stroke-linejoin="round" />
  
  <!-- Inner AI Node -->
  <circle cx="50" cy="48" r="12" fill="url(#logo-grad)" filter="url(#glow)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinity" />
  </circle>
  
  <!-- Connection Lines -->
  <path d="M50 36V25" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" opacity="0.5" />
  <path d="M62 48H73" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" opacity="0.5" />
  <path d="M38 48H27" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" opacity="0.5" />
  <path d="M50 60V71" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" opacity="0.5" />
  
  <!-- Central Core -->
  <circle cx="50" cy="48" r="4" fill="white" />
</svg>
